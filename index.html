<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ego Boost</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            padding: 20px;
        }
        .compliment-text {
            width: 100%;
            max-width: 90vw;
            text-align: center;
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            color: white;
            line-height: 1.1;
            margin-bottom: 5vh;
            text-transform: uppercase;
            animation: none;
            word-wrap: break-word;
        }
        .boost-button {
            width: 200px;
            height: 60px;
            border-radius: 50px;
            background: white;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: black;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);        }
        .boost-button:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        .boost-button:active {
            transform: scale(0.98);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div class="compliment-text" id="compliment">GET READY TO BE CHAMP</div>
    <button class="boost-button" id="boostButton">BOOST ME</button>

    <script>
        const compliments = [
            "YOU ARE UNSTOPPABLE",
            "THE WORLD IS LUCKY TO HAVE YOU",
            "YOUR VIBE IS ILLEGAL",
            "YOU'RE A FREAKING LEGEND",
            "ENEMIES WOULD CRY IF YOU QUIT",
            "YOU'RE THE MAIN CHARACTER",
            "PEOPLE FOLLOW YOUR LEAD",
            "YOU'VE GOT THAT XFACTOR",
            "YOU'RE A POWERHOUSE",
            "THEY DON'T MAKE YOU LIKE THIS ANYMORE",
            "YOU'RE BUILT DIFFERENT",
            "YOU'RE THE GOAT",
            "YOUR CONFIDENCE IS CONTAGIOUS",
            "YOU'RE ABSOLUTELY KILLING IT",
            "YOU'RE THE REALEST ONE IN THE ROOM",
            "YOU'VE CRACKED THE CODE",
            "YOU'RE AN INSPIRATION MACHINE",
            "YOU'RE THE HIDDEN WEAPON",
            "YOU'VE MASTERED THE ART OF WINNING",
            "YOU'RE A NATURAL PHENOMENON"
        ];
        
        const neonColors = ["#FF1493", "#00BFFF", "#32CD32", "#FFD700"];
        let colorIndex = 0;
        let audioContext = null;
        
        const complimentElement = document.getElementById("compliment");
        const boostButton = document.getElementById("boostButton");
                function getRandomCompliment() {
            return compliments[Math.floor(Math.random() * compliments.length)];
        }
        
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function playSound() {
            initAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = 900;
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }
        
        boostButton.addEventListener("click", () => {
            initAudioContext();
            complimentElement.textContent = getRandomCompliment();
            complimentElement.style.color = neonColors[colorIndex];
            colorIndex = (colorIndex + 1) % neonColors.length;
            
            // Trigger shake animation
            complimentElement.style.animation = 'none';
            void complimentElement.offsetWidth; // Trigger reflow
            complimentElement.style.animation = 'shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97)';
            
            playSound();
        });
        
        // Initialize with first compliment on load
        complimentElement.textContent = getRandomCompliment();
    </script></body>
</html>
